<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap" rel="stylesheet" />

        <link rel="stylesheet" type="text/css" href="../style.css" />

        <script type="module" src="../JS/core.js"></script>
        <script type="module" src="../JS/test.js" defer></script>

        <title>The Glitched Labyrinth</title>
    </head>
    <body>
        <header>
            <img src="../images/header.png" />
            <img class="wumpusImage" src="../images/wumpus_core.png" />
        </header>

        <main>
            <section class="mainSection">
                <div class="mainSectionHead">
                    <h2>[ The Web Core ]</h2>
                </div>
                <div class="mainSectionBody">
                    <p>At the center floats a radiant sphere of structured light.</p>
                </div>
            </section>

            <nav>
                <a href="./room_12.htm" class="directionButton">SOUTH</a>
                <a href="./room_15.htm" class="directionButton">WEST</a>
            </nav>

            <div class="cards">
                <section class="card">
                    <div class="sectionHead">
                        <h2>[ Senses ]</h2>
                    </div>
                    <div class="sectionBody">
                        <p><span class="danger">You hear corrupted static leaking through the walls.</span></p>
                    </div>
                </section>
                <section class="card">
                    <div class="sectionHead">
                        <h2>[ Player Status ]</h2>
                    </div>
                    <div class="sectionBody">
                        <p>Health: <span id="health">20</span>/20</p>
                        <p>Inventory: Empty</p>
                    </div>
                </section>
            </div>
        </main>

        <footer>
            <p>© 2026 David Watkin</p>
        </footer>
    </body>
</html>
